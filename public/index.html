<section class="hero">
  <div class="container">
    <h1 id="hero-title">UNIFORMAR</h1>
    <p class="tagline-script" id="hero-tag">ambos que te cuidan a vos</p>
    <p class="lead" id="hero-desc">Cargando información de la tienda…</p>
  </div>
</section>

<main class="container">
  <div class="filters">
    <input type="search" id="f-search" placeholder="Buscar por nombre o modelo…">
    <select id="f-categoria"><option value="">Todas las categorías</option></select>
    <select id="f-talle"><option value="">Todos los talles</option></select>
    <select id="f-color"><option value="">Todos los colores</option></select>
    <select id="f-orden">
      <option value="orden">Orden de la tienda</option>
      <option value="nombre">Nombre A-Z</option>
      <option value="precio-asc">Precio: menor a mayor</option>
      <option value="precio-desc">Precio: mayor a menor</option>
    </select>
    <span class="chip-clear" id="f-clear" style="display:none;">Limpiar filtros ✕</span>
  </div>

  <div id="grid-container">
    <div class="loader"><div class="spinner"></div>Cargando catálogo…</div>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-grid">
    <div>
      <img class="foot-logo brand-logo-img" src="images/logo.png" alt="UniformAR">
      <p id="foot-desc">Ambos y uniformes profesionales para salud.</p>
      <div class="social-row">
        <a id="ig-link-2" class="icon-btn" href="#" target="_blank" rel="noopener">IG</a>
        <a id="wa-link-2" class="icon-btn" href="#" target="_blank" rel="noopener">WA</a>

    <div>

      <p id="foot-loc">—</p>
    </div>
    <div>

    </div>
  </div>
  <p class="footer-bottom">© <span id="year"></span> UniformAR · Identidad profesional</p>
</footer>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script src="tienda.js"></script>
